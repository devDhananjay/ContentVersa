# Paste this block INSIDE the `server { ... }` block in /etc/nginx/conf.d/contentverse.conf
# (a bare `location` file in conf.d will not load). Match alias path to UPLOAD_DIR on EC2.
#
#     location ^~ /uploads/ {
#         alias /home/ec2-user/ContentVersa/data/uploads/;
#         expires 30d;
#         add_header Cache-Control "public";
#     }
#
# Nginx must read files under ec2-user home — run once after creating data/uploads:
#   chmod o+x /home/ec2-user /home/ec2-user/ContentVersa /home/ec2-user/ContentVersa/data
#   chmod -R o+rX /home/ec2-user/ContentVersa/data/uploads
